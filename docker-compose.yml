version: "3.9"

services:
  backend:
    image: python:3.11-slim
    working_dir: /app/backend
    volumes:
      - .:/app
    command: >
      sh -c "echo 'Checkpoint 1 stub: backend service not wired yet.' && sleep infinity"
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - .:/app
    command: >
      sh -c "echo 'Checkpoint 1 stub: frontend service not wired yet.' && sleep infinity"
    ports:
      - "5173:5173"
